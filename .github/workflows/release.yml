name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ── Linux : AppImage + .deb ────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - run: npm ci

      - name: Patch version + targets
        run: |
          node -e "
            const fs = require('fs'), p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p));
            c.version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            c.bundle.targets = ['deb', 'appimage'];
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          name: Open Bingo v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ── Windows : installeur .exe ──────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - run: npm ci

      - name: Patch version + targets
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = $version
          $conf.bundle.targets = @('nsis')
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          name: Open Bingo v${{ env.VERSION }}
          files: src-tauri/target/release/bundle/nsis/*.exe

  # ── macOS : .dmg ──────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - run: npm ci

      - name: Patch version + targets
        run: |
          node -e "
            const fs = require('fs'), p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p));
            c.version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            c.bundle.targets = ['dmg'];
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          name: Open Bingo v${{ env.VERSION }}
          files: src-tauri/target/release/bundle/dmg/*.dmg

  # ── Android : .apk ────────────────────────────────────────────────────────
  build-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Android SDK + NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;28.0.12433566"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - run: npm ci

      - name: Patch version
        run: |
          node -e "
            const fs = require('fs'), p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p));
            c.version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.12433566
        run: npm run android -- build --apk

      - uses: softprops/action-gh-release@v2
        with:
          name: Open Bingo v${{ env.VERSION }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
