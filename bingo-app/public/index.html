<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Générateur de Bingo</title>
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/dashboard.css">
  <link rel="stylesheet" href="style/grid.css">
  <link rel="stylesheet" href="style/print.css">
</head>
<body>
  <div id="app">

    <!-- ─── Vue : liste des projets ─── -->
    <div id="view-projects" class="app-view">
      <header>
        <div class="header-top-row">
          <div class="header-left">
            <span>Générateur de Bingo</span>
          </div>
          <div class="header-actions">
            <button id="btn-export-all">Exporter tout</button>
            <label class="btn-import" for="import-all-file">Importer</label>
            <input type="file" id="import-all-file" accept=".json">
          </div>
        </div>
      </header>
      <main>
        <div id="projects-panel"></div>
      </main>
    </div>

    <!-- ─── Vue : éditeur ─── -->
    <div id="view-editor" class="app-view">
      <header>
        <div class="header-top-row">
          <div class="header-left">
            <button id="btn-back-projects" class="btn-back">← Projets</button>
            <span id="app-title">Générateur de Bingo</span>
          </div>
          <div class="header-actions">
            <button id="btn-export">Exporter</button>
            <label class="btn-import" for="import-file">Importer</label>
            <input type="file" id="import-file" accept=".json">
          </div>
        </div>
        <nav class="tabs">
          <button class="tab-btn active" data-tab="config">Configuration</button>
          <button class="tab-btn" data-tab="cases">Phrases &amp; Gages</button>
          <button class="tab-btn" data-tab="grids">Grilles</button>
          <button class="tab-btn" data-tab="print">Aperçu impression</button>
        </nav>
      </header>

      <main>
        <section id="tab-config" class="tab-panel active">
          <div id="config-form"></div>
        </section>
        <section id="tab-cases" class="tab-panel">
          <div id="cases-panel"></div>
        </section>
        <section id="tab-grids" class="tab-panel">
          <div id="grids-panel"></div>
        </section>
        <section id="tab-print" class="tab-panel">
          <div id="print-panel"></div>
        </section>
      </main>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
